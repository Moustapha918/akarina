# ─────────────────────────────────────────────────────────────────────────────
# Profil LOCAL — lancement direct depuis l'IDE ou la ligne de commande.
# Activation : ./gradlew bootRun --args='--spring.profiles.active=local'
#              ou via la variable d'env : SPRING_PROFILES_ACTIVE=local
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/akarina_db
    username: akarina
    password: akarina_secret

  jpa:
    hibernate:
      # create-drop : recrée le schéma à chaque démarrage (pratique en dev,
      # à remplacer par 'validate' dès qu'on intègre Flyway)
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Stockage local dans le répertoire temporaire du projet
akarina:
  kyc:
    upload-dir: ${user.home}/akarina-local/kyc

  contract:
    output-dir: ${user.home}/akarina-local/contracts

  bankily:
    simulation-mode: true   # toujours true en local

logging:
  level:
    mr.akarina: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
