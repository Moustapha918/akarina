<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-700 to-primary-900 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-primary-700">Akarina</h1>
      <p class="text-gray-500 text-sm mt-1">منصة التمويل العقاري التشاركي</p>
    </div>

    <!-- Error -->
    @if (error()) {
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 mb-4 text-sm">
        {{ error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition"
          placeholder="vous@exemple.mr"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="text-red-500 text-xs mt-1">Email invalide.</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input
          type="password"
          formControlName="password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || loading()"
        class="w-full bg-primary-700 hover:bg-primary-800 disabled:bg-gray-300 text-white font-semibold rounded-lg py-3 transition"
      >
        @if (loading()) { Connexion... } @else { Se connecter }
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Pas encore de compte ?
      <a routerLink="/auth/register" class="text-primary-700 font-medium hover:underline">Créer un compte</a>
    </p>
  </div>
</div>
