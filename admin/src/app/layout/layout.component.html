<div class="layout" [class.sidebar-open]="sidebarOpen()">

  <!-- Sidebar Overlay (mobile) -->
  @if (sidebarOpen()) {
    <div class="sidebar-overlay" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="logo-icon">A</span>
        <span class="logo-text">Akarina Admin</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        class="nav-item"
        (click)="closeSidebar()"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Tableau de bord</span>
      </a>

      <a
        routerLink="/kyc"
        routerLinkActive="active"
        class="nav-item"
        (click)="closeSidebar()"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>Vérification KYC</span>
      </a>

      <a
        routerLink="/projects"
        routerLinkActive="active"
        class="nav-item"
        (click)="closeSidebar()"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0H5m14 0h2m-2 0H3"/>
        </svg>
        <span>Projets</span>
      </a>

      <a
        routerLink="/investments"
        routerLinkActive="active"
        class="nav-item"
        (click)="closeSidebar()"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
        </svg>
        <span>Investissements</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main-wrapper">
    <!-- Top bar -->
    <header class="topbar">
      <button class="hamburger" (click)="toggleSidebar()" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-title">Akarina Admin</div>
      <div class="topbar-user">
        <div class="user-avatar">{{ (authService.currentUser()?.name ?? 'A')[0].toUpperCase() }}</div>
        <span class="user-name">{{ authService.currentUser()?.name }}</span>
      </div>
    </header>

    <!-- Page content -->
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
